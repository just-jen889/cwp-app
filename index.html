<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lake County Clean Water Program</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Arial,Helvetica,sans-serif;background:#f0f4f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .card{background:#fff;border-radius:12px;padding:40px;text-align:center;max-width:480px;width:90%;box-shadow:0 4px 20px rgba(0,0,0,0.08)}
    .logo{width:80px;height:80px;border-radius:50%;background:#E0EEF2;border:3px solid #2B6E7E;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#2B6E7E;line-height:1.3}
    h1{font-size:20px;color:#1D5069;margin-bottom:6px}
    .sub{font-size:13px;color:#666;margin-bottom:24px;line-height:1.5}
    .badge{display:inline-block;background:#E1F5EE;color:#0F6E56;border:0.5px solid #7DD4B3;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:24px}
    .permit{font-size:11px;color:#999;border-top:0.5px solid #eee;padding-top:16px;margin-top:8px}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">LAKE CO<br>CLEAN<br>WATER</div>
    <h1>Lake County Clean Water Program</h1>
    <div class="sub">MS4 Stormwater Compliance Platform<br>Lakeport · Clearlake · County of Lake</div>
    <div class="badge">✓ Deployment successful</div>
    <p style="font-size:13px;color:#555;line-height:1.6">Your Clean Water Program app is live.<br>Full application coming soon.</p>
    <div class="permit">MS4 Permit WQ 2013-0001-DWQ · §E.9.d</div>
  </div>
</body>
</html>
